[workspace]
members = ["cargo:backend"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Use .tar.gz instead of .tar.xz for broader compatibility
unix-archive = ".tar.gz"
# Build with all features
all-features = true
# Whether to install an updater program
install-updater = false
# Homebrew tap for formula publishing
tap = "rsvalerio/homebrew-tap"
# Publish homebrew formula to tap via the user-owned custom publish job
# (.github/workflows/publish-homebrew.yml), which mints a GitHub App token
# instead of using a static HOMEBREW_TAP_TOKEN PAT. Being a custom job, it
# survives `dist generate` regeneration.
publish-jobs = ["./publish-homebrew"]
# Custom formula name for Homebrew (install with `brew install oxydraw`)
formula = "oxydraw"
