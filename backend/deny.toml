[graph]
targets = []

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# RUSTSEC-2023-0071: Marvin timing attack in `rsa` (via openidconnect). It leaks an RSA
# PRIVATE key through timing. We only VERIFY OIDC ID-token signatures with the provider's
# PUBLIC key and never perform RSA private-key operations, so there is no exploitable path.
# No fixed `rsa` release exists yet; revisit when one ships.
#
# The next two are `unmaintained` notices (not vulnerabilities) for transitive deps of the
# `rust_socketio` DEV-dependency, used only by the collaboration integration test. Remove if
# that dev-dependency is dropped or updated.
ignore = [
    "RUSTSEC-2023-0071",
    "RUSTSEC-2025-0012", # backoff unmaintained (rust_socketio, dev only)
    "RUSTSEC-2024-0384", # instant unmaintained (rust_socketio, dev only)
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
# r-efi uses LGPL-2.1-or-later but is only linked on UEFI targets
exceptions = [
    { allow = ["LGPL-2.1-or-later"], crate = "r-efi" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
